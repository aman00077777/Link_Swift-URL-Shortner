{% extends "base.html" %}

{% block title %}404 Link Swift | Resource Not Found{% endblock %}

{% block content %}
<div class="card error-page">
    <div class="error-code">404</div>
    <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 1rem;">Link Unresolved</h2>
    <p class="subtitle" style="margin-bottom: 2rem;">
        The requested short URL is invalid or has expired. Please verify the code slug or shorten a new target link.
    </p>
    <a href="{{ url_for('index') }}" class="btn-primary" style="text-decoration: none;">
        <i class="fa-solid fa-house"></i>
        <span>Return to Home</span>
    </a>
</div>
{% endblock %}
